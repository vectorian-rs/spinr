name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Validate version
        run: |
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build
        run: cargo build --release --target=${{ matrix.target }} --bin spinr

      - name: Test
        run: cargo test --release --target=${{ matrix.target }}

      - name: Package
        run: |
          ARCHIVE="spinr-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}"
          mkdir "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/spinr" "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: spinr-${{ matrix.artifact_suffix }}
          path: |
            spinr-*.tar.gz
            spinr-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Combined checksums
        run: cat *.sha256 > checksums-sha256.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: spinr ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            spinr-*.tar.gz
            spinr-*.tar.gz.sha256
            checksums-sha256.txt
