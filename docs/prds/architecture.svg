<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="monospace" font-size="12">
  <defs>
    <style>
      .box { fill: none; stroke: #333; stroke-width: 1.5; rx: 6; }
      .outer { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 8; }
      .trace { fill: #e8f4fd; }
      .loadtest { fill: #fdf2e8; }
      .mcp { fill: #e8fde8; }
      .cli { fill: #f0e8fd; }
      .label { font-weight: bold; font-size: 13px; }
      .small { font-size: 10px; fill: #555; }
      .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,3; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Outer binary box -->
  <rect class="outer" x="10" y="10" width="700" height="500"/>
  <text class="label" x="360" y="35" text-anchor="middle">spinr binary (single crate)</text>

  <!-- CLI Parser -->
  <rect class="box cli" x="280" y="50" width="160" height="45"/>
  <text class="label" x="360" y="70" text-anchor="middle">main.rs + cli.rs</text>
  <text class="small" x="360" y="83" text-anchor="middle">argh subcommand dispatch</text>

  <!-- Mode decision -->
  <text class="small" x="200" y="120" text-anchor="middle">CLI mode</text>
  <text class="small" x="520" y="120" text-anchor="middle">--mcp mode</text>

  <!-- Arrows from CLI parser -->
  <path class="arrow" d="M 320,95 L 200,130"/>
  <path class="arrow" d="M 400,95 L 520,130"/>

  <!-- CLI output box -->
  <rect class="box cli" x="120" y="130" width="160" height="40"/>
  <text x="200" y="150" text-anchor="middle">output.rs</text>
  <text class="small" x="200" y="163" text-anchor="middle">human-readable / JSON</text>

  <!-- MCP server box -->
  <rect class="box mcp" x="440" y="130" width="160" height="40"/>
  <text x="520" y="150" text-anchor="middle">mcp/stdio.rs</text>
  <text class="small" x="520" y="163" text-anchor="middle">JSON-RPC 2.0 server</text>

  <!-- Arrows down to modules -->
  <path class="arrow" d="M 170,170 L 170,200"/>
  <path class="arrow" d="M 230,170 L 490,200"/>
  <path class="arrow" d="M 490,170 L 170,200"/>
  <path class="arrow" d="M 550,170 L 550,200"/>

  <!-- trace module -->
  <rect class="box trace" x="30" y="200" width="280" height="130"/>
  <text class="label" x="170" y="222" text-anchor="middle">trace/</text>
  <line x1="30" y1="230" x2="310" y2="230" stroke="#333" stroke-width="1"/>
  <text x="50" y="250">tracer.rs</text>
  <text class="small" x="140" y="250">HTTP timing engine</text>
  <text class="small" x="60" y="270">DNS → TCP → TLS → TTFB → Transfer</text>
  <line x1="50" y1="280" x2="290" y2="280" stroke="#ddd" stroke-width="0.5"/>
  <text x="50" y="298">types.rs</text>
  <text class="small" x="140" y="298">TraceResult, TimingInfo</text>
  <text class="small" x="60" y="316">HttpVersion, ConnectionInfo</text>

  <!-- loadtest module -->
  <rect class="box loadtest" x="340" y="200" width="350" height="130"/>
  <text class="label" x="515" y="222" text-anchor="middle">loadtest/</text>
  <line x1="340" y1="230" x2="690" y2="230" stroke="#333" stroke-width="1"/>
  <text x="360" y="250">manager.rs</text>
  <text class="small" x="460" y="250">spawns worker processes</text>
  <text x="360" y="270">worker.rs</text>
  <text class="small" x="460" y="270">rate-limited (governor)</text>
  <text x="360" y="290">max_throughput.rs</text>
  <text class="small" x="500" y="290">closed-loop async</text>
  <text x="360" y="310">types.rs</text>
  <text class="small" x="460" y="310">HdrHistogram, MergedMetrics</text>

  <!-- mcp module -->
  <rect class="box mcp" x="30" y="360" width="280" height="130"/>
  <text class="label" x="170" y="382" text-anchor="middle">mcp/</text>
  <line x1="30" y1="390" x2="310" y2="390" stroke="#333" stroke-width="1"/>
  <text x="50" y="410">mod.rs</text>
  <text class="small" x="130" y="410">JSON-RPC + MCP protocol types</text>
  <text x="50" y="430">stdio.rs</text>
  <text class="small" x="130" y="430">stdio JSON-RPC server</text>
  <text x="50" y="450">transport.rs</text>
  <text class="small" x="150" y="450">HTTP/SSE transport (axum)</text>
  <text class="small" x="60" y="475">McpTool, JsonRpcRequest/Response</text>

  <!-- External deps box -->
  <rect class="box" x="340" y="360" width="350" height="130" style="fill:#f5f5f5"/>
  <text class="label" x="515" y="382" text-anchor="middle">Key Dependencies</text>
  <line x1="340" y1="390" x2="690" y2="390" stroke="#333" stroke-width="1"/>
  <text class="small" x="360" y="410">hyper + tokio-rustls + hickory    HTTP tracing</text>
  <text class="small" x="360" y="430">reqwest + governor + hdrhistogram  load testing</text>
  <text class="small" x="360" y="450">axum + tower-http                 MCP HTTP transport</text>
  <text class="small" x="360" y="470">argh                              CLI parsing</text>
  <text class="small" x="360" y="485">tokio                             async runtime</text>

  <!-- Arrows from trace/loadtest to mcp -->
  <path class="arrow dashed" d="M 170,330 L 170,360"/>
  <path class="arrow dashed" d="M 515,330 L 250,360"/>
</svg>
